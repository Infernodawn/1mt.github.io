<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>立达校园事项办理</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f4f6fb;
      min-height: 100vh;
    }

    /* 顶部区域 */
    .header {
      text-align: center;
      padding: 40px 24px 24px;
      background: linear-gradient(180deg, #eef2ff 0%, #f4f6fb 100%);
    }

    .logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .logo {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow: 0 6px 20px rgba(127, 27, 27, 0.2);
    }

    .school-name {
      font-size: 20px;
      font-weight: 700;
      color: #7F1B1B;
    }

    .header-sub {
      font-size: 13px;
      color: #8896b3;
    }

    /* 主容器 */
    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 20px 40px;
    }

    /* 主标题 */
    .main-title {
      text-align: center;
      font-size: 16px;
      font-weight: 500;
      color: #8896b3;
      margin-bottom: 20px;
    }

    /* 一级按钮 */
    .group {
      margin-bottom: 14px;
    }

    .group-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      background: #fff;
      border: none;
      border-radius: 16px;
      padding: 18px 20px;
      cursor: pointer;
      text-align: left;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 2px 12px rgba(127, 27, 27, 0.08);
      transition: box-shadow 0.2s;
      gap: 12px;
    }

    .group-btn:hover {
      box-shadow: 0 4px 20px rgba(127, 27, 27, 0.14);
    }

    .group-btn-left {
      display: flex;
      align-items: center;
      gap: 14px;
      flex: 1;
    }

    .group-icon {
      width: 48px;
      height: 48px;
      border-radius: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }

    .group-icon.orange { background: linear-gradient(135deg, #fff3e0, #ffe0b2); }
    .group-icon.blue   { background: linear-gradient(135deg, #e8f0fe, #d4e2fc); }
    .group-icon.green  { background: linear-gradient(135deg, #e8f5e9, #c8e6c9); }
    .group-icon.purple { background: linear-gradient(135deg, #f3e5f5, #e1bee7); }

    .group-title {
      font-size: 17px;
      font-weight: 600;
      color: #1a1f36;
    }

    .group-hint {
      font-size: 12px;
      color: #b0bac9;
      margin-top: 2px;
    }

    .group-arrow {
      font-size: 22px;
      color: #c0cdfc;
      transition: transform 0.25s ease;
      flex-shrink: 0;
    }

    .group-btn.active .group-arrow {
      transform: rotate(90deg);
    }

    /* 二级按钮列表 */
    .sub-list {
      display: none;
      flex-direction: column;
      gap: 8px;
      margin-top: 8px;
      padding-left: 8px;
    }

    .sub-list.open {
      display: flex;
    }

    .sub-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fff;
      border: none;
      border-radius: 13px;
      padding: 14px 18px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 1px 6px rgba(127, 27, 27, 0.06);
      transition: background 0.15s, box-shadow 0.15s;
      gap: 12px;
    }

    .sub-btn:hover {
      background: #f8f9ff;
      box-shadow: 0 3px 12px rgba(127, 27, 27, 0.12);
    }

    .sub-btn-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
    }

    .sub-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #c0cdfc;
      flex-shrink: 0;
    }

    .sub-label {
      font-size: 15px;
      font-weight: 500;
      color: #2c3e60;
    }

    .sub-arrow {
      font-size: 18px;
      color: #d0daec;
      flex-shrink: 0;
    }

    /* 底部 */
    .footer {
      text-align: center;
      padding: 28px 0 8px;
      font-size: 12px;
      color: #b0bac9;
      border-top: 1px solid #e8ecf4;
      margin-top: 8px;
    }

    .footer-hint {
      margin-top: 4px;
      font-size: 13px;
      color: #c8d0e0;
    }

    .footer-accent {
      color: #7F1B1B;
      font-weight: 600;
    }
  </style>
</head>

      });

      // 如果之前是关闭的，则打开
      if (!isOpen) {
        sub.classList.add('open');
        btn.classList.add('active');
      }
    }
  </script>
</body>
</html>
